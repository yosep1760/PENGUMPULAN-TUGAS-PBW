<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Praktikum Bab 4 - Formulir</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Selamat Datang di Website Sederhana</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Tentang</a></li>
            <li><a href="#">Layanan</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="content">
            <h2>Formulir Pendaftaran</h2>
            <p>Silakan isi formulir di bawah ini untuk mendaftar.</p>
            
            <form action="#" method="POST">
                <label for="nama">Nama Lengkap:</label>
                <input type="text" id="nama" name="nama" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label>Jenis Kelamin:</label>
                <div class="radio-group">
                    <input type="radio" id="laki" name="gender" value="laki">
                    <label for="laki" class="inline-label">Laki-laki</label><br>
                    <input type="radio" id="perempuan" name="gender" value="perempuan">
                    <label for="perempuan" class="inline-label">Perempuan</label>
                </div>

                <label>Hobi:</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="musik" name="hobi" value="musik">
                    <label for="musik" class="inline-label">Musik</label><br>
                    <input type="checkbox" id="olahraga" name="hobi" value="olahraga">
                    <label for="olahraga" class="inline-label">Olahraga</label><br>
                    <input type="checkbox" id="membaca" name="hobi" value="membaca">
                    <label for="membaca" class="inline-label">Membaca</label>
                </div>

                <label for="kota">Pilih Kota:</label>
                <select id="kota" name="kota">
                    <option value="jakarta">Jakarta</option>
                    <option value="bandung">Bandung</option>
                    <option value="surabaya">Surabaya</option>
                </select>

                <label for="pesan">Pesan Tambahan:</label>
                <textarea id="pesan" name="pesan" rows="4" placeholder="Tulis pesan di sini..."></textarea>

                <button type="submit" class="btn">Kirim</button>
            </form>
        </section>

        <aside class="sidebar">
            <h2>Sidebar</h2>
            <p>Bagian sidebar dapat berisi tautan, iklan, atau informasi tambahan.</p>
        </aside>
    </div>
</body>
</html>
